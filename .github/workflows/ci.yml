name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        name: Test (Go ${{ matrix.go }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                go: [stable, oldstable, "1.21"]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go ${{ matrix.go }}
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go }}
                  cache: true

            - name: go vet
              run: go vet ./...

            - name: Test
              run: go test -v -count=1 -timeout=120s ./...

            - name: Test with race detector
              run: go test -race -count=1 -timeout=120s ./...

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: true

            - name: golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.1.6
                  args: --timeout=5m --config=.github/.golangci.yml

    staticcheck:
        name: Staticcheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: true

            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@latest

            - name: Run staticcheck
              run: staticcheck ./...

    docs:
        name: Doc examples
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: true

            - name: Run doc examples
              run: go test -v -run=^Example ./...

    benchmark:
        name: Benchmarks (smoke)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: true

            - name: Run benchmarks
              run: go test -bench=. -benchtime=1s -benchmem ./...
